<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 Rút Lộc 8/3 💖</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Dancing+Script:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div class="background-decor">
    <span>🌸</span><span>💖</span><span>✨</span><span>🌸</span><span>🌷</span>
  </div>

  <div class="container">
    <div class="box">
      <h1 class="title">🎁 Rút Lộc 8/3 🎁</h1>
      <p class="subtitle">Chúc phái đẹp luôn rạng rỡ như hoa!</p>

      <div id="loginBox" class="fade-in">
        <div class="input-group">
          <input id="code" type="text" placeholder="Nhập mã bí mật của bạn..." />
        </div>
        <button class="btn btn-primary" onclick="login()">Đăng nhập ngay</button>
      </div>

      <div id="main" style="display:none;" class="fade-in">
        <div class="balance-card">
          <small>Số dư khả dụng</small>
          <h2 id="userBalance">0 VNĐ</h2>
        </div>
        <h3 id="welcome"></h3>
        <div class="action-buttons">
          <button class="btn btn-draw" onclick="rutLoc()">🌸 Rút lộc ngay</button>
          <button class="btn btn-withdraw-toggle" onclick="showWithdrawForm()">💳 Nhận "Ting Ting" ngay nhé!</button>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="goHome()">🏠 Trang chủ</button>
            <button class="btn btn-outline" onclick="logout()">Đăng xuất</button>
          </div>
        </div>
        <div id="result" class="result-box"></div>
      </div>

      <div id="withdrawSection" style="display:none;" class="fade-in">
        <h3>💳 Rút tiền về ngân hàng</h3>
        <p style="font-size: 12px; color: #d81b60;">* Hệ thống sẽ tự động rút hết số dư hiện có của bạn.</p>
        <div class="input-group">
          <select id="bankId" onchange="updateQR()">
            <option value="">-- Chọn ngân hàng --</option>
            <option value="vcb">Vietcombank</option>
            <option value="mbbank">MB Bank</option>
            <option value="tcb">Techcombank</option>
            <option value="icb">VietinBank</option>
            <option value="acb">ACB</option>
            <option value="momo">Ví MoMo (SĐT)</option>
          </select>
          <input id="accNumber" type="text" placeholder="Số tài khoản nhận tiền" oninput="updateQR()" />
          <input id="drawAmount" type="text" readonly
            style="background: #f0f0f0; color: #d81b60; font-weight: bold; cursor: not-allowed;" />
        </div>
        <div id="qrArea" style="display:none; text-align: center; margin: 15px 0;">
          <img id="qrImg" src="" alt="Mã QR" style="width: 180px; border: 2px solid #ff9a9e; border-radius: 10px;">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="confirmWithdraw()">Xác nhận rút sạch lộc</button>
          <button class="btn btn-secondary" onclick="hideWithdrawForm()">Quay lại</button>
        </div>
      </div>

      <hr class="divider">
      <div class="leaderboard">
        <h2 class="ranking-title">🌸 Lộc Nàng Thơ 🌸</h2>
        <ul id="ranking">
        </ul>
      </div>
    </div>
  </div>
  <script src="script.js"></script>

  <audio id="bgMusic" loop>
    <source src="../mp3/nhacxoso.mp3" type="audio/mpeg">
  </audio>

</body>

</html>
